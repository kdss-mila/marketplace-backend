# =========================================================================
# docker-compose - Marketplace Backend (.NET 9 + Postgres gerenciado)
#
# A API roda em http://localhost:5066 (mesma porta usada em dev por
# launchSettings.json), mapeando para a porta 8080 dentro do container.
# A persistência é feita em Postgres — as credenciais podem ser passadas
# por variáveis de ambiente (.env local) ou preenchendo os defaults abaixo
# apenas para dev.
#
# Como rodar:
#   docker compose up --build
#   docker compose down
# =========================================================================

services:
  marketplace-api:
    container_name: marketplace-api
    image: marketplace-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5066:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Configurações de plataforma (sobrescrevem appsettings.json).
      # A notação __ representa a hierarquia do JSON.
      PlatformSettings__PixKey: marketplace@pix.com.br
      PlatformSettings__CommissionRate: "0.10"
      # Preencha com o seu Postgres gerenciado (Render/Neon/AWS RDS/etc.).
      ConnectionStrings__Postgres: "${POSTGRES_CONNECTION_STRING:-}"
      # JWT — obrigatório: SigningKey precisa ter no mínimo 32 chars.
      JwtSettings__SigningKey: "${JWT_SIGNING_KEY:-}"
      JwtSettings__Issuer: "marketplace-api"
      JwtSettings__Audience: "marketplace-web"
      JwtSettings__ExpiresHours: "8"
      # Lista das origens autorizadas pelo CORS. Use um índice por entrada
      # (Cors__AllowedOrigins__0, __1, ...) para adicionar mais domínios.
      # Se ficar vazio, o backend cai no fallback de dev (localhost:5173/4173).
      Cors__AllowedOrigins__0: "${FRONTEND_ORIGIN:-}"
    volumes:
      # Persiste os comprovantes salvos pelo LocalFileStorageService entre
      # reinícios do container. O caminho dentro do container espelha a
      # estrutura de wwwroot/uploads do projeto.
      - marketplace-uploads:/app/wwwroot/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/swagger/index.html >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  marketplace-uploads:
